<!DOCTYPE html>
<html>
  <head>
    <title>RapidIdentity Login</title>
    <link rel="shortcut icon" href="https://apsva.us002-rapididentity.com:443/files/apsA.jpg">
  </head>
  <body style="background-color:white">
    <button style='width:60px;height:6vh;position:fixed;top:0;left:0;z-index:3;background-color:rgba(200,200,200,0.6);color:black' id='fs-button'>FS</button>
    <button style='width:100px;height:6vh;position:fixed;top:0;left:60px;z-index:2;background-color:rgba(200,200,200,0.6);color:black' id='bk-button'>BACK</button>
    <iframe 
      id='gameFrame' 
      allowfullscreen 
      style='
        position:fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        margin: 0;
        padding: 0;
        border: none;
        z-index: 1
      ' 
      src='about:blank'>
    </iframe>
    <script>
      function fs() {
        var elem = document.getElementById('gameFrame');
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.mozRequestFullScreen) { 
            elem.mozRequestFullScreen();
        } else if (elem.webkitRequestFullscreen) { 
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
      }
      
      async function back(){
        let n=await fetch('https://pugmoog.github.io/Bugmoog/menu.html')
        let h=await n.text()
        document.open();
        document.write(h);
        document.close();
      }  

      document.getElementById("fs-button").addEventListener("click", fs);
      document.getElementById("bk-button").addEventListener("click", back);
      
      setInterval(focus, 20);   
      function focus() {     
        var frame = document.getElementById('gameFrame');     
        frame.contentWindow.focus();   
      }
    </script>
  </body>
</html>
