    <script>
      setInterval(focus, 20);   
      function focus() {     
        var frame = document.getElementById('gameFrame');     
        frame.contentWindow.focus();   
      } 

      async function loadPage(url){
        document.open();
        document.write("<iframe id='gameFrame' style='position:fixed;left:0;top:0;width:100vw;height:100vh;overflow:hidden;margin:0;padding:0;border:none' src='"+url+"'></iframe>");
        document.close();
      }  

      document.querySelectorAll('button').forEach(button=>{
        if (!(button.id=== "run-code")) {
        button.onclick=function(){
          loadPage("https://pugmoog.github.io/games/"+this.dataset.url);
        };
        }
      });
    </script>
