  const original = Navigator.prototype.getGamepads;
  
  Navigator.prototype.getGamepads = function() {

      console.warn('Gamepad blocked, returning empty');

    }

    try {

    <script>
	let focusInterval;

      if (window.location.href === "https://pugmoog.github.io/Bugmoog/menu.html") {
        window.location.href = "https://rugmoog.github.io";
      }

      const counter = new Counter({ workspace: 'rugmoogs-team-3882' });


    counter.up('bugmoog-menu');
    const gamePageFrame = document.getElementById("gamePageFrame");
      
      async function loadPage(url){
        counter.up("bugmoog-game-opened");
        let response = await fetch("https://pugmoog.github.io/Bugmoog/game-page.html");
        let html = await response.text();

        gamePageFrame.srcdoc = html;
        gamePageFrame.style.display = "block";

        await new Promise(resolve => {
          gamePageFrame.onload = resolve;
        });
        
        let frame = gamePageFrame.contentDocument.getElementById("gameFrame");
        frame.src = "https://pugmoog.github.io/games/" + url;
	const backButton = gamePageFrame.contentDocument.getElementById("bk-button");
	backButton.addEventListener("click", closePage);
        focusInterval = setInterval(focus, 20);

        const script = frame.contentDocument.createElement('script');
        script.textContent = `navigator.getGamepads = function() { return []; };`;
        frame.contentDocument.head.insertBefore(script, frame.contentDocument.head.firstChild);

      }  

      function password(url) {
        let tryy = prompt("enter password");
        if (tryy==="12927") {
          loadPage(url)
        }
      }

      const searchBox = document.getElementById("search");
      searchBox.addEventListener('input', search);
      
      function search() {
        const query = searchBox.value.toLowerCase().replace(/[^\w\s]/g, '');
        const elements = document.querySelectorAll('button.game');
        elements.forEach(element => {
          const h3Text = element.querySelector("h3").textContent;
          const h3TextStripped = h3Text.toLowerCase().replace(/[^\w\s]/g, '')
          if (h3TextStripped.includes(query) || query === "") {
            element.style.display = "block";
          } else {
            element.style.display = "none";
          }
        });
      }
      

      function focus() {    
	if (gamePageFrame.style.display === "block") {
          var frame = gamePageFrame.contentDocument.getElementById('gameFrame');     
          frame.contentWindow.focus();   
        }
      }

	function closePage() {
  gamePageFrame.style.display = "none";
  gamePageFrame.srcdoc = "";
  clearInterval(focusInterval);
}



    </script>
